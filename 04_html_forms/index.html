<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>フォーム部品のカタログ</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <h1>新人エンジニア アンケート</h1>
        <p>以下の項目に入力してください。</p>

        <form>
            <div class="form-group">
                <label for="fullname">お名前</label>
                <input type="text" id="fullname" placeholder="例：山田 太郎">
            </div>

            <div class="form-group">
                <label>使用している PC（どちらか1つ）</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" value="win"> Windows
                    </label>
                    <label>
                        <input type="radio" value="mac"> Mac
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>興味のある技術（複数選択可）</label>
                <div class="checkbox-group">
                    <input type="checkbox">
                    <label>Java</label> <input type="checkbox">
                    <label>Docker</label>
                </div>
            </div>

            <div class="form-group">
                <label>所属部署</label>
            </div>

            <div class="form-group">
                <label>意気込み</label>
            </div>

            <button type="submit" class="btn-submit">回答を完了する</button>
        </form>
    </div>
</body>

</html>
