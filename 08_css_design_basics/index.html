        <article class="post-card">
            <header class="post-header">
                <span class="post-category">デザイン</span>
                <h2 class="post-title">デザインと実装の橋渡しをするために</h2>
                <p class="post-meta">2024年3月15日 · 読了時間 5分</p>
            </header>
            <p class="post-body">
                デザイナーが作成したモックアップを見て「このデザイン、どう実装するんだろう」と思ったことはありませんか？
                タイポグラフィ、色、余白——これらを体系的に理解することで、デザインデータをスムーズに CSS へと落とし込めるようになります。
                デザイナーと共通言語で話せるようになることが、チームの実装速度を大きく高めます。
            </p>
